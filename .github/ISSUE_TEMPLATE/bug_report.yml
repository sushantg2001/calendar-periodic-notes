name: Bug report
description: Report something that is not working as expected
labels: [bug]
body:
    - type: textarea
      id: what-happened
      attributes:
          label: What happened?
          description: A clear description of the bug and what you expected instead.
      validations:
          required: true
    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: List the exact steps that trigger the problem.
          placeholder: |
              1. Open the calendar
              2. Click ...
              3. See error
      validations:
          required: true
    - type: input
      id: plugin-version
      attributes:
          label: Plugin version
          placeholder: 1.0.0
      validations:
          required: true
    - type: input
      id: obsidian-version
      attributes:
          label: Obsidian version
          placeholder: 1.7.2
      validations:
          required: true
    - type: textarea
      id: context
      attributes:
          label: Additional context
          description: Console errors, screenshots, or anything else that helps.
      validations:
          required: false
