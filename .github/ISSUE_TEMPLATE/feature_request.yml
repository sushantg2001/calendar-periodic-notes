name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What are you trying to do that the plugin does not support today?
      validations:
          required: true
    - type: textarea
      id: proposal
      attributes:
          label: Proposed solution
          description: Describe the behaviour or option you would like to see.
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
      validations:
          required: false
