name: CI

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Test
              run: bun run test

            - name: Build
              run: bun run build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: plugin-build
                  path: |
                      main.js
                      manifest.json
                      styles.css
