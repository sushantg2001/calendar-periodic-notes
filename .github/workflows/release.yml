name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Tag to release (e.g. 1.0.1). Defaults to the ref the run was started from.'
                required: false
                type: string

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Build plugin
              run: |
                  bun install --frozen-lockfile
                  bun run lint
                  bun run test
                  bun run build

            - name: Attest build provenance
              uses: actions/attest-build-provenance@v3
              with:
                  subject-path: main.js

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ inputs.tag || github.ref_name }}
              run: |
                  gh release create "$TAG" \
                    --title="$TAG" \
                    --draft \
                    main.js manifest.json styles.css
